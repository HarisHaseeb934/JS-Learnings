<!DOCTYPE html>
<html lang="en">

<body>
    <script>
        function sum(num){
            if(num == 1){
                return num;
            }else{
                return num + sum(num - 1)
            }
        }
        console.log(sum(100));

        // Task 2
        function factorial(num){
            if(num == 1){
                return num;
            }else{
                return num * factorial(num - 1);
            }
        }
        console.log(factorial(5));

        // Task 3
        function fib(num){
            if(num < 0){
                return 0;
            }else if(num == 1){
                return 1;
            }else{
                return fib(num - 1) + fib(num - 2);
            }
        }
        console.log(fib(7));
    </script>
</body>
</html>
