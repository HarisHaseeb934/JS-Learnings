    <script>
      // Task 1
      function camelSize(str) {
        return str
          .split("-")
          .map((item, index) =>
            index === 0 ? item : item[0].toUpperCase() + item.slice(1),
          )
          .join("");
      }
      console.log(camelSize("back-ground"));

      // Task 2
      function filterRange(arr, a, b) {
        return arr.filter((item) => item >= a && item <= b);
      }
      console.log(filterRange([1, 2, 3, 4, 5, 6], 3, 6));

      // Task 3
      function filterRangeInPlace(arr, a, b) {
        for (let i = 0; i < arr.length; i++) {
          if (arr[i] < a || arr[i] > b) {
            arr.splice(i, 1);
            i--;
          }
        }
      }
      console.log(filterRange([1, 2, 3, 4, 5, 6], 3, 6));

      let arr = [2, 3, 4, 5, 52, 6];
      arr.sort((a, b) => b - a);
      console.log(arr);

      // Task 4
      function copySorted(arr) {
        return arr.sort((a, b) => a.localeCompare(b));
      }
      console.log(copySorted(["haris", "Soban", "Mute"]));

      // Task 5
      function Calculator() {
        this.method = {
          "+": (a, b) => a + b,
          "-": (a, b) => a - b,
        };

        this.calulate = function (str) {
          let arr = str.split(" ");
          a = +arr[0];
          op = arr[1];
          c = +arr[2];

          if (!this.method[op] || isNaN(a) || isNaN(c)) {
            return NaN;
          }

          return this.method[op](a, c);
        };
        this.addMethod = function (name, func) {
          this.method[name] = func;
        };
      }
      let cal = new Calculator();
      console.log(cal.calulate("1 + 3"));

      function getAverageAge(users) {
        return users.reduce((prev, users) => prev + users.age, 0 / users.length);
      }

      // Task 9
      function unique(arr) {
        let result = [];
        for(let value of arr){
          if(!result.includes(value)){
            result.push(value);
          }
        }
        return result;
      }
