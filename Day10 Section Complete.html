    <script>
      let sampleMod = {
        title: "Fixed ESMs ",
        loadOrder: 12,
        author: "   Modder123",
      };
      function validateAndCleanMod(modObj) {
        if ("esmFile" in modObj === false) {
          modObj["esmFile"] = "required_base.esm";
        }
        for (let key in modObj) {
          if (typeof modObj[key] === "number") {
            modObj[key] *= 2;
          } else if (modObj[key] === "string") {
            modObj[key] = modObj[key].trim();
          }
        }
      }
      validateAndCleanMod(sampleMod);
      for (let key in sampleMod) {
        console.log(`${key} : ${sampleMod[key]}`);
      }

      function GameItem(name, type, weight) {
        if (!new.target) {
          return new GameItem(name, type, weight);
        }
        this.name = name;
        this.type = type;
        this.weight = weight;
        this.condition = 100;
        
      }

      let gun1 = GameItem("Laser Rifle", "Weapon", 8);

      console.log(gun1.condition);

      // Task 5
      function CryptoAsset(ticker, coinsCount, currentPrice){
        this.ticker = ticker;
        this.coinsCount = coinsCount;
        this.currentPrice = currentPrice;
        this[Symbol.toPrimitive] = function(hint){
          return (hint === "string") ? `Asset: ${this.ticker} | Holdings: ${this.coinsCount}` : (this.coinsCount * this.currentPrice);
        }
      }

      let btc = new CryptoAsset("BTC", 0.5, 60000);
      let eth = new CryptoAsset("ETH", 4, 3000);

      alert(btc);
