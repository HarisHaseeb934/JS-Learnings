      function createCounter() {
        let count = 0;
        return function () {
          return count++;
        };

      // Task 2
      function makeMultiplier(num) {
        return function (num2) {
          return num * num2;
        };
      }

      const double = makeMultiplier(2);
      const triple = makeMultiplier(3);

      console.log(double(5));
      console.log(triple(5));
