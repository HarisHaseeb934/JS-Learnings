        function min(a,b){
            if(a < b){
                return a;
            }
            return b;
        }
        // console.log(min(3,7));

        // Task 3

        function power(b,p){
            if(p === 0) return 1;
            let result = b;
            for(let i = 1; i <= p; i++){
                result *= b; 
            }
            return result;
        }
        // console.log(power(2,4));


        // Task 4
        function formatPrice(amount, currencySymbol = "$"){
            if(currencySymbol === null || currencySymbol === ""){
                return "$" +amount;
            }
            return currencySymbol + amount;
        }

        // Task 6
        function isPrime(num){
            for(let i = 2; i < num; i++){
                if(num % i === 0) return false;
            }
            return true;
        }
        function printPrimesUpTo(limit){
            for(let i = 2; i < limit; i++){
                if(!isPrime(i)) continue;
                console.log(i);
            }
        }
        printPrimesUpTo(20);
        console.log(isPrime(13));
