      // Task 4

      class NetworkError extends Error {
        constructor(message) {
          super(message);
          this.name = "NetworkError";
        }
      }

      function downloadFile(fileName) {
        return new Promise((resolve, reject) => {
          if (fileName === "" || fileName === undefined) {
            reject(new NetworkError("File name cannot be empty"));
          } else {
            setTimeout(
              () => resolve(`Download ${fileName} successfully`),
              1000,
            );
          }
        });
      }

      // Task

      function fetchUserAge(username) {
        return new Promise((resolve) => {
          setTimeout(() => resolve(25), 1000);
        });
      }

      function doubleAge(age) {
        return new Promise((resolve) => {
          setTimeout(() => resolve(age * 2), 500);
        });
      }

      function formatMessage(doubledAge) {
        return new Promise((resolve) => {
          setTimeout(() => resolve(`Your age doubled is: ${doubledAge}`), 500);
        });
      }

      fetchUserAge("Alex")
        .then((result) => doubleAge(result))
        .then((doubledAge) => formatMessage(doubledAge))
        .then((finalMessage) => console.log(finalMessage));

      // Task
      function checkInventory(item) {
        return new Promise((resolve) => {
          if (item === "PlayStation") {
            setTimeout(() => resolve(true), 1000);
          } else {
            setTimeout(() => resolve(false), 1000);
          }
        });
      }

      function reserveItem() {
        return new Promise((resolve) => {
          setTimeout(() => resolve("Item Reserved"), 500);
        });
      }

      function backOrder() {
        return new Promise((resolve) => {
          setTimeout(
            () => resolve("Item backordered (will take 2 weeks)"),
            500,
          );
        });
      }

      checkInventory("PlayStation")
        .then((isInStock) => {
          if (isInStock) {
            return reserveItem();
          } else {
            return backOrder();
          }
        })
        .then((status) => console.log(status));

      // Task
      function getPrimaryDatabase() {
        return new Promise((resolve, reject) =>
          reject(new Error("Primary database is offline")),
        );
      }

      function getBackupDatabase() {
        return new Promise((resolve) => {
          setTimeout(() => resolve("Backup Data"), 1000);
        });
      }

      function renderDashboard(data) {
        return new Promise((resolve) => {
          setTimeout(() => resolve("Dashboard loaded with: " + data), 1000);
        });
      }

      getPrimaryDatabase()
        .catch((err) => {
          console.log("Primary DB failed, switching to backup...");
          return getBackupDatabase();
        })
        .then((data) => renderDashboard(data))
        .then((message) => console.log(message))
        .catch((err) => console.log(err));
