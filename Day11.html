        // Task 6
        function extractPixels(styleString){
            if(!isNaN(parseInt(styleString))){
                return parseInt(styleString);
            }else if(styleString[0] === "#"){
                let newstr = "";
                for(let i = 1; i < styleString.length; i++){
                    newstr += styleString[i];
                }
                return parseInt(newstr, 16);
            }else{
                return 0;
            }
        }
        console.log(extractPixels("#0xff"));
