<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Modal Practice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Trigger Button -->
  <button id="open-btn" class="btn">Open Modal</button>

  <!-- Modal Overlay (Hidden by default) -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-box">
      <button id="close-btn" class="close-x">&times;</button>
      <h2>Hello there! 👋</h2>
      <p>You successfully opened this modal. Now, write the JavaScript to close it by clicking the 'X' button or by clicking anywhere outside of this white box.</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
